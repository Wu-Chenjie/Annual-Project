          selected ? '#f97316' : isStart ? '#16a34a' : isEnd ? '#d92d20' : '#64748b',
          selected ? 12 : 8,
          isStart ? 'square' : isEnd ? 'diamond' : 'circle'
        ));
        selections.push({kind: 'waypoint', index});
      });
      let camera = {eye: {x: 1.45, y: -1.65, z: 1.05}};
      if (target._fullLayout?.scene?.camera) {
        camera = target._fullLayout.scene.camera;
      }
      Plotly.react(target, traces.filter(Boolean), {
        margin: {l: 0, r: 0, t: 8, b: 0},
        paper_bgcolor: '#f8fafc',
        dragmode: 'orbit',
        uirevision: 'map-editor-camera',
        scene: {
          xaxis: {title: 'X / m'},
          yaxis: {title: 'Y / m'},
          zaxis: {title: 'Z / m'},
          aspectmode: 'data',
          camera
        },
        legend: {orientation: 'h', y: 0.02, x: 0.02}
      }, {responsive: true, displaylogo: false}).then(() => {
        if (target.removeAllListeners) target.removeAllListeners('plotly_click');
        target.on?.('plotly_click', event => {
          const point = event.points?.[0];
          const selection = selections[point?.curveNumber] || pointSelections[point?.curveNumber]?.[point?.pointNumber];
          if (selection) {
            editorSelection = selection;
            refreshEditorObjectSelect();
            renderEditorObjectForm();
            drawEditorDragCanvas();
            $('editorStatus').textContent = '已选中对象；如需移动，请在右下角 2D 编辑面板中拖动';
          }
        });
      });
    }

    function buildPayload() {
      const planners = [];
      if ($('useDstar').checked) planners.push('dstar_lite');
      if ($('useAstar').checked) planners.push('astar');
      if ($('useHybridAstar').checked) planners.push('hybrid_astar');
      return {
        preset: $('preset').value,
        map_file: $('mapFile').value,
        repeat_count: Number($('repeatCount').value),
        compare_planners: planners,
        base_config: {
          preset: $('preset').value,
          map_file: $('mapFile').value,
          max_sim_time: Number($('simTime').value),
          planner_resolution: Number($('resolution').value),
          safety_margin: Number($('margin').value),
          planner_replan_interval: Number($('replanInterval').value),
          leader_max_vel: Number($('leaderVel').value)
        },
        events: events.map(toEventJson)
      };
    }

    function toEventJson(ev) {
      if (ev.action === 'remove') {
        return {t: Number(ev.t), action: 'remove', target_id: ev.target_id || 'obs_0'};
      }
      if (ev.action === 'move') {
        return {
          t: Number(ev.t),
          action: 'move',
          target_id: ev.target_id || 'obs_0',
          obstacle: {
            id: ev.target_id || 'obs_0',
            type: ev.type,
            center_or_min: [Number(ev.x), Number(ev.y), Number(ev.z)],
            size_or_max: [Number(ev.a), Number(ev.b), Number(ev.c)]
          }
        };
      }
      return {
        t: Number(ev.t),
        action: 'add',
        obstacle: {
          type: ev.type,
          center_or_min: [Number(ev.x), Number(ev.y), Number(ev.z)],
          size_or_max: [Number(ev.a), Number(ev.b), Number(ev.c)]
        }
      };
    }

    function ensureEventUiIds() {
      events.forEach(ev => {
        if (!ev._ui_id) ev._ui_id = `event_${nextEventUiId++}`;
      });
      if (!selectedEventId && events.length) selectedEventId = events[0]._ui_id;
      selectedEventIndex = Math.max(0, events.findIndex(ev => ev._ui_id === selectedEventId));
      if (!events.length) {
        selectedEventIndex = -1;
        selectedEventId = '';
      } else if (selectedEventIndex < 0) {
        selectedEventIndex = 0;
        selectedEventId = events[0]._ui_id;
      }
    }

    function currentTimelineTime() {
      const frame = currentFrame(lastReplay);
      return Number((frame?.t ?? 0).toFixed(3));
    }

    function defaultSizeForType(type) {
      if (type === 'aabb') return [2, 2, 2];
      if (type === 'cylinder') return [1, 0, 2];
      return [1, 0, 0];
    }

    function obstacleId(obs, index) {
      return obs?.id || `obs_${index}`;
    }

    function timelineTargetId() {
      const selected = $('timelineTargetSelect')?.value || '';
      const frame = currentFrame(lastReplay);
      const obstacles = frame?.obstacles || lastReplay?.static_map?.obstacles || [];
      return selected || obstacleId(obstacles[0], 0) || 'obs_0';
    }

    function obstacleToEventFields(obs) {
      if (!obs) return null;
      return {
        type: obs.type || 'sphere',
        x: Number(obs.center_or_min?.[0] ?? 0),
        y: Number(obs.center_or_min?.[1] ?? 0),
        z: Number(obs.center_or_min?.[2] ?? 0),
        a: Number(obs.size_or_max?.[0] ?? 1),
        b: Number(obs.size_or_max?.[1] ?? 0),
        c: Number(obs.size_or_max?.[2] ?? 0)
      };
    }

    function defaultEvent(action = 'add') {
      const frame = currentFrame(lastReplay);
      const obstacles = frame?.obstacles || lastReplay?.static_map?.obstacles || [];
      const target = timelineTargetId();
      const obstacle = obstacles.find((obs, index) => obstacleId(obs, index) === target) || obstacles[0];
      const type = $('timelineTypeSelect')?.value || 'sphere';
      const leader = frame?.leader_pose || [15, 10, 3];
      const base = obstacleToEventFields(obstacle);
      const [a, b, c] = defaultSizeForType(type);
      const ev = {
        _ui_id: `event_${nextEventUiId++}`,
        t: currentTimelineTime(),
        action,
        type,
        x: Number((leader[0] + 1).toFixed(2)),
        y: Number(leader[1].toFixed(2)),
        z: Number(leader[2].toFixed(2)),
        a, b, c,
        target_id: action === 'add' ? '' : target
      };
      if ((action === 'move' || action === 'remove') && base) {
        Object.assign(ev, base);
        if (action === 'move') ev.x = Number((ev.x + 1).toFixed(2));
      }
      return ev;
    }

    function renderEvents() {
      ensureEventUiIds();
      events.sort((a, b) => Number(a.t) - Number(b.t));
      ensureEventUiIds();
      syncReplayEventsFromEditor();
      $('eventList').innerHTML = events.map((ev, index) => eventCardHtml(ev, index)).join('');
      $('eventList').querySelectorAll('[data-field]').forEach(input => {
        input.addEventListener('input', updateEventFromInput);
        input.addEventListener('change', updateEventFromInput);
      });
      $('eventList').querySelectorAll('[data-select-event]').forEach(btn => {
        btn.addEventListener('click', event => {
          event.stopPropagation();
          selectTimelineEvent(Number(btn.dataset.selectEvent), true);
        });
      });
      $('eventList').querySelectorAll('[data-event-summary]').forEach(summary => {
        summary.addEventListener('click', event => {
          if (event.target.closest('button')) return;
          selectTimelineEvent(Number(summary.dataset.eventSummary), true);
        });
      });
      $('eventList').querySelectorAll('[data-remove]').forEach(btn => {
        btn.addEventListener('click', () => {
          const removed = events.splice(Number(btn.dataset.remove), 1)[0];
          if (removed?._ui_id === selectedEventId) selectedEventId = events[Math.min(events.length - 1, Number(btn.dataset.remove))]?._ui_id || '';
          renderEvents();
        });
      });
      $('eventsJson').value = JSON.stringify(events.map(toEventJson), null, 2);
      refreshTimelineEditor();
      updateTimeline();
    }

    function syncReplayEventsFromEditor() {
      if (!lastReplay) return;
      lastReplay.dynamic_events = events.map(toEventJson);
      eventsDirtySinceRun = true;
    }

    function updateEventFromInput(event) {
      const el = event.currentTarget;
      const index = Number(el.dataset.index);
      const field = el.dataset.field;
      if (!events[index]) return;
      selectedEventId = events[index]._ui_id || selectedEventId;
      events[index][field] = el.type === 'number' ? Number(el.value) : el.value;
      if (field === 'action' && (el.value === 'remove' || el.value === 'move') && !events[index].target_id) {
        events[index].target_id = 'obs_0';
      }
      if (field === 'action' || field === 'type') renderEvents();
      else {
        $('eventsJson').value = JSON.stringify(events.map(toEventJson), null, 2);
        syncReplayEventsFromEditor();
        refreshTimelineEditor();
        updateTimeline();
      }
    }

    function eventCardHtml(ev, index) {
      const isRemove = ev.action === 'remove';
      const isMove = ev.action === 'move';
      const typeOptions = ['sphere', 'aabb', 'cylinder']
        .map(type => `<option value="${type}" ${ev.type === type ? 'selected' : ''}>${type}</option>`).join('');
      const actionOptions = ['add', 'remove', 'move']
        .map(action => `<option value="${action}" ${ev.action === action ? 'selected' : ''}>${action === 'add' ? '添加' : action === 'remove' ? '移除' : '移动'}</option>`).join('');
      const sizeLabels = ev.type === 'aabb'
        ? ['max X', 'max Y', 'max Z']
        : ev.type === 'cylinder'
          ? ['半径', 'z min', 'z max']
          : ['半径', '-', '-'];
      const selectedClass = ev._ui_id === selectedEventId ? ' is-selected' : '';
      const openAttr = ev._ui_id === selectedEventId ? ' open' : '';
      return `
        <details class="event-card${selectedClass}"${openAttr}>
          <summary data-event-summary="${index}">
            <strong>${eventLabel(ev, index)}</strong>
            <button class="icon-btn" title="选中事件" data-select-event="${index}">⌖</button>
            <button class="icon-btn" title="删除事件" data-remove="${index}">×</button>
          </summary>
          <div class="event-fields">
            <label>时间(s)<input type="number" step="0.1" data-index="${index}" data-field="t" value="${ev.t}"></label>
            <label>操作<select data-index="${index}" data-field="action">${actionOptions}</select></label>
            ${isRemove ? `
              <label class="wide">目标 ID<input data-index="${index}" data-field="target_id" value="${ev.target_id || ''}" placeholder="obs_3"></label>
            ` : `
              ${isMove ? `<label class="wide">目标 ID<input data-index="${index}" data-field="target_id" value="${ev.target_id || ''}" placeholder="obs_0"></label>` : ''}
              <label>类型<select data-index="${index}" data-field="type">${typeOptions}</select></label>
              <label>X / min X<input type="number" step="0.1" data-index="${index}" data-field="x" value="${ev.x}"></label>
              <label>Y / min Y<input type="number" step="0.1" data-index="${index}" data-field="y" value="${ev.y}"></label>
              <label>Z / min Z<input type="number" step="0.1" data-index="${index}" data-field="z" value="${ev.z}"></label>
              <label>${sizeLabels[0]}<input type="number" step="0.1" data-index="${index}" data-field="a" value="${ev.a}"></label>
              <label>${sizeLabels[1]}<input type="number" step="0.1" data-index="${index}" data-field="b" value="${ev.b}"></label>
              <label>${sizeLabels[2]}<input type="number" step="0.1" data-index="${index}" data-field="c" value="${ev.c}"></label>
            `}
          </div>
        </details>
      `;
    }

    function eventLabel(ev, index) {
      const action = ev.action === 'add' ? '添加' : ev.action === 'remove' ? '移除' : '移动';
      const target = ev.action === 'add' ? (ev.type || 'obstacle') : (ev.target_id || 'obs_0');
      return `#${index + 1}  t=${Number(ev.t).toFixed(1)}s  ${action} ${target}`;
    }

    function refreshTimelineEditor() {
      if (!$('timelineEventSelect')) return;
      ensureEventUiIds();
      const selectedIndex = Math.max(0, events.findIndex(ev => ev._ui_id === selectedEventId));
      $('timelineEventSelect').innerHTML = events.length
        ? events.map((ev, index) => `<option value="${index}" ${index === selectedIndex ? 'selected' : ''}>${eventLabel(ev, index)}</option>`).join('')
        : '<option value="-1">暂无事件</option>';
      $('timelineEventSelect').disabled = events.length === 0;
      $('jumpTimelineEventBtn').disabled = !lastReplay || events.length === 0;
      $('pinEventToFrameBtn').disabled = !lastReplay || events.length === 0;
      refreshTimelineTargets();
      renderTimelineMarkers();
    }

    function refreshTimelineTargets() {
      if (!$('timelineTargetSelect')) return;
      const previous = $('timelineTargetSelect').value;
      const frame = currentFrame(lastReplay);
      const obstacles = frame?.obstacles || lastReplay?.static_map?.obstacles || [];
      const options = obstacles.map((obs, index) => {
        const id = obstacleId(obs, index);
        return `<option value="${id}" ${id === previous ? 'selected' : ''}>${id} (${obs.type || 'obstacle'})</option>`;
      }).join('');
      $('timelineTargetSelect').innerHTML = options || '<option value="obs_0">obs_0</option>';
    }

    function renderTimelineMarkers() {
      if (!$('timelineMarkers')) return;
      const frameEvents = collectCurrentFrameEvents(lastReplay);
      const globalEvents = getGlobalTimelineEvents(lastReplay);
      const frameDynamicEvents = collectCurrentFrameDynamicEvents(lastReplay);
      if (!frameDynamicEvents.length && !frameEvents.length && !globalEvents.length) {
        $('timelineMarkers').innerHTML = '<span class="muted">当前帧附近无事件</span>';
        return;
      }
      const dynamicHtml = frameDynamicEvents.map(({ev, index}) => {
        const active = ev._ui_id === selectedEventId ? ' active' : '';
        return `<button type="button" class="timeline-marker dynamic${active}" data-marker-event="${index}">${eventLabel(ev, index)}</button>`;
      }).join('');
      const simHtml = frameEvents.map(ev => {
        const current = ev.frameIndex === currentFrameIndex ? ' current' : '';
        return `<button type="button" class="timeline-marker ${ev.kind}${current}" data-marker-frame="${ev.frameIndex}" title="${ev.detail}">${ev.label}</button>`;
      }).join('');
      const timelineHtml = globalEvents.map(ev => {
        const current = currentFrameIndex >= ev.frameIndex && currentFrameIndex <= ev.lastFrame ? ' current' : '';
        return `<button type="button" class="timeline-marker ${ev.kind}${current}" data-marker-frame="${ev.frameIndex}" title="${ev.detail}">${ev.label}</button>`;
      }).join('');
      $('timelineMarkers').innerHTML = timelineHtml + dynamicHtml + simHtml;
      $('timelineMarkers').querySelectorAll('[data-marker-event]').forEach(btn => {
        btn.addEventListener('click', () => selectTimelineEvent(Number(btn.dataset.markerEvent), true));
      });
      $('timelineMarkers').querySelectorAll('[data-marker-frame]').forEach(btn => {
        btn.addEventListener('click', () => setFrame(Number(btn.dataset.markerFrame)));
      });
    }

    function collectCollisionTimelineEvents(replay) {
      if (!replay?.frames?.length) return [];
      const raw = [];
      replay.frames.forEach((frame, index) => {
        if (!frame.collision) return;
        const time = Number(frame.t ?? 0);
        raw.push({
          kind: 'collision',
          key: 'collision',
          frameIndex: index,
          time,
          label: `碰撞 t=${time.toFixed(1)}s`,
          detail: `第 ${index + 1} 帧检测到碰撞`
        });
      });
      return compactTimelineEvents(raw).map(ev => {
        if (ev.count <= 1) return ev;
        return {
          ...ev,
          label: `碰撞 t=${ev.time.toFixed(1)}-${ev.endTime.toFixed(1)}s`,
          detail: `第 ${ev.frameIndex + 1}-${ev.lastFrame + 1} 帧连续碰撞`
        };
      });
    }

    function collectCurrentFrameDynamicEvents(replay) {
      const frame = currentFrame(replay);
      if (!replay || !frame) return [];
      const prevT = currentFrameIndex > 0 ? Number(replay.frames[currentFrameIndex - 1].t ?? -Infinity) : -Infinity;
      const t = Number(frame.t ?? 0);
      return events
        .map((ev, index) => ({ev, index, time: Number(ev.t)}))
        .filter(item => item.time > prevT + 1e-9 && item.time <= t + 1e-9);
    }

    function collectCurrentFrameEvents(replay) {
      const frame = currentFrame(replay);
      if (!replay || !frame) return [];
      const time = Number(frame.t ?? 0);
      const out = [];
      if (frame.collision) {
        out.push({
          kind: 'collision',
          frameIndex: currentFrameIndex,
          label: `碰撞 t=${time.toFixed(1)}s`,
          detail: `当前帧检测到碰撞`
        });
      }
      if (frame.clearance_blocked) {
        out.push({
          kind: 'clearance',
          frameIndex: currentFrameIndex,
          label: `连续clearance阻塞 t=${time.toFixed(1)}s`,
          detail: `胶囊体检查发现下一运动段安全距离不足，已阻止继续前进`
        });
      }
      if (frame.obstacle_changed) {
        out.push({
          kind: 'obstacle',
          frameIndex: currentFrameIndex,
          label: `障碍物变化 t=${time.toFixed(1)}s`,
          detail: `当前帧动态障碍物状态变化`
        });
      }
      const replanners = ['dstar_lite', 'astar', 'hybrid_astar'].filter(name => frame[name]?.replan_triggered);
      if (replanners.length) {
        out.push({
          kind: 'replan',
          frameIndex: currentFrameIndex,
          label: `重规划：${replanners.map(plannerLabel).join(' / ')}`,
          detail: `当前帧触发重规划`
        });
      }
      const totals = {collision: 0, clearance: 0, obstacle: 0, replan: 0};
      if (false && (totals.collision || totals.clearance || totals.obstacle || totals.replan)) {
        out.push({
          kind: 'dynamic',
          frameIndex: currentFrameIndex,
          label: `全程：碰撞${totals.collision} 阻塞${totals.clearance} 障碍${totals.obstacle} 重规划${totals.replan}`,
          detail: `全程事件统计`
        });
      }
      return out;
    }

    function getGlobalTimelineEvents(replay) {
      if (globalTimelineCache.replay === replay) return globalTimelineCache.events;
      const events = collectGlobalTimelineEvents(replay);
      globalTimelineCache = {replay, events};
      return events;
    }

    function collectGlobalTimelineEvents(replay) {
      if (!replay?.frames?.length) return [];
      const raw = [];
      replay.frames.forEach((frame, index) => {
        const time = Number(frame.t ?? 0);
        if (frame.collision) {
          raw.push({
            kind: 'collision',
            key: 'collision',
            frameIndex: index,
            time,
            label: `碰撞 t=${time.toFixed(1)}s`,
            detail: `第 ${index + 1} 帧检测到碰撞`
          });
        }
        if (false && frame.obstacle_changed) {
          raw.push({
            kind: 'obstacle',
            key: 'obstacle',
            frameIndex: index,
            time,
            label: `障碍物变化 t=${time.toFixed(1)}s`,
            detail: `第 ${index + 1} 帧动态障碍物状态变化`
          });
        }
        if (frame.clearance_blocked) {
          raw.push({
            kind: 'clearance',
            key: 'clearance',
            frameIndex: index,
            time,
            label: `clearance blocked t=${time.toFixed(1)}s`,
            detail: `Frame ${index + 1} was blocked by the clearance guard`
          });
        }
        const replanners = [];
        replanners.forEach(name => {
          raw.push({
            kind: 'replan',
            key: `replan:${name}`,
            frameIndex: index,
            time,
            label: `${plannerLabel(name)}重规划 t=${time.toFixed(1)}s`,
            detail: `第 ${index + 1} 帧 ${plannerLabel(name)} 触发重规划`
          });
        });
      });
      raw.sort((a, b) => a.key.localeCompare(b.key) || a.frameIndex - b.frameIndex);
      return compactTimelineEvents(raw).sort((a, b) => a.frameIndex - b.frameIndex);
    }

    function compactTimelineEvents(rawEvents) {
      if (!rawEvents.length) return [];
      const groups = [];
      rawEvents.forEach(ev => {
        const last = groups[groups.length - 1];
        if (last && last.key === ev.key && ev.frameIndex <= last.lastFrame + 1) {
          last.count += 1;
          last.lastFrame = ev.frameIndex;
          last.endTime = ev.time;
          last.detail = `${last.baseDetail}，连续 ${last.count} 帧`;
        } else {
          groups.push({
            ...ev,
            count: 1,
            lastFrame: ev.frameIndex,
            endTime: ev.time,
            baseDetail: ev.detail
          });
        }
      });
      return groups.map(ev => {
        if (ev.count <= 1) return ev;
        const timeText = ev.time === ev.endTime
          ? `t=${ev.time.toFixed(1)}s`
          : `t=${ev.time.toFixed(1)}-${ev.endTime.toFixed(1)}s`;
        const name = ev.kind === 'collision'
          ? '碰撞'
          : ev.kind === 'obstacle'
            ? '障碍物变化'
            : ev.label.replace(/\s*t=.*/, '');
        return {
          ...ev,
          label: `${name} x${ev.count} ${timeText}`
        };
      });
    }

    function plannerLabel(name) {
      return {dstar_lite: 'D* Lite', astar: 'Grid A*', hybrid_astar: 'Hybrid A*'}[name] || name;
    }

    function selectTimelineEvent(index, jump = false) {
      if (!events.length || !events[index]) return;
      selectedEventIndex = index;
      selectedEventId = events[index]._ui_id;
      $('timelineEventSelect').value = String(index);
      renderEvents();
      if (jump) jumpToSelectedEvent();
    }

    function jumpToSelectedEvent() {
      if (!lastReplay || !events.length) return;
      const ev = events[Math.max(0, selectedEventIndex)] || events[0];
      const targetTime = Number(ev.t);
      let nearest = 0;
      let best = Infinity;
      lastReplay.frames.forEach((frame, index) => {
        const diff = Math.abs(Number(frame.t) - targetTime);
        if (diff < best) {
          best = diff;
          nearest = index;
        }
      });
      setFrame(nearest);
    }

    function pinSelectedEventToFrame() {
      if (!lastReplay || !events.length) return;
      const ev = events[Math.max(0, selectedEventIndex)] || events[0];
      ev.t = currentTimelineTime();
      selectedEventId = ev._ui_id;
      renderEvents();
      updateTimeline();
    }

    function insertEventAtCurrentFrame() {
      const action = $('timelineActionSelect').value || 'add';
      const ev = defaultEvent(action);
      if (action !== 'add') ev.target_id = timelineTargetId();
      events.push(ev);
      selectedEventId = ev._ui_id;
      renderEvents();
      updateTimeline();
    }

    async function runSimulation() {
      $('runBtn').disabled = true;
      $('status').textContent = '运行中...';
      try {
        const payload = buildPayload();
        const response = await fetch('/api/simulate', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify(payload)
        });
        const body = await response.json();
        if (!response.ok) throw new Error(body.detail || '仿真失败');
        lastReplay = body.results[0];
        resetGlobalTimelineCache();
        currentFrameIndex = 0;
        eventsDirtySinceRun = false;
        $('runMeta').textContent = `${lastReplay.metadata.step_count} 帧 · seed ${lastReplay.metadata.seed} · ${lastReplay.metadata.execution_scope || 'leader_centric'}`;
        $('status').textContent = `完成：${body.results.length} 次运行`;
        $('viewToolbar').classList.remove('is-hidden');
        $('timeline').classList.remove('is-hidden');
        $('timelineEditor').classList.remove('is-hidden');
        $('eventReadout').classList.remove('is-hidden');
        setupTimeline(lastReplay);
        setFrame(0);
        renderMetrics(lastReplay);
        renderCharts(lastReplay);
      } catch (error) {
        $('status').textContent = error.message;
      } finally {
        $('runBtn').disabled = false;
      }
    }

    function setActiveView(view) {
      activeView = view;
      renderActiveView();
    }

    let playTimer = null;

    function togglePlay() {
      if (playTimer) {
        clearInterval(playTimer);
        playTimer = null;
        $('playBtn').textContent = '▶';
        return;
      }
      if (!lastReplay) return;
      $('playBtn').textContent = '⏸';
      playTimer = setInterval(() => {
        if (currentFrameIndex >= lastReplay.frames.length - 1) {
          clearInterval(playTimer);
          playTimer = null;
          $('playBtn').textContent = '▶';
          return;
        }
        setFrame(currentFrameIndex + 1);
      }, 80);
    }

    function setFrame(value) {
      if (!lastReplay) return;
      const max = Math.max(0, lastReplay.frames.length - 1);
      currentFrameIndex = Math.min(Math.max(0, Math.round(Number(value))), max);
      $('frameSlider').value = String(currentFrameIndex);
      updateTimeline();
      if (activeView === '3d') renderPlot3D(lastReplay);
      else {
        resizeCanvas();
        drawReplay(lastReplay);
      }
    }

    function renderActiveView() {
      const show3d = activeView === '3d';
      $('view2dBtn').classList.toggle('active', !show3d);
      $('view3dBtn').classList.toggle('active', show3d);
      $('mapCanvas').classList.toggle('is-hidden', show3d);
      $('plot3d').classList.toggle('is-hidden', !show3d);
      $('mapLegend').classList.toggle('is-hidden', show3d);
      if (show3d) renderPlot3D(lastReplay);
      else {
        resizeCanvas();
        drawReplay(lastReplay);
      }
      updateTimeline();
    }

    function setupTimeline(replay) {
      const max = Math.max(0, replay.frames.length - 1);
      $('frameSlider').max = String(max);
      $('frameSlider').value = String(currentFrameIndex);
      updateTimeline();
      refreshTimelineEditor();
    }

    function currentFrame(replay) {
      if (!replay || !replay.frames.length) return null;
      const index = Math.min(Math.max(0, currentFrameIndex), replay.frames.length - 1);
      return replay.frames[index];
    }

    function updateTimeline() {
      if (!lastReplay) return;
      const index = Math.min(Math.max(0, currentFrameIndex), lastReplay.frames.length - 1);
      const frame = lastReplay.frames[index];
      $('frameSlider').value = String(index);
      $('frameIndex').textContent = `${index + 1} / ${lastReplay.frames.length}`;
      $('frameTime').textContent = `t=${(frame?.t ?? 0).toFixed(1)}s`;
      $('prevFrameBtn').disabled = index <= 0;
      $('nextFrameBtn').disabled = index >= lastReplay.frames.length - 1;
      $('eventReadout').textContent = frameReadout(lastReplay, frame);
      refreshTimelineTargets();
      renderTimelineMarkers();
    }

    function frameReadout(replay, frame) {
      if (!frame) return '未运行';
      const prevT = currentFrameIndex > 0 ? replay.frames[currentFrameIndex - 1].t : -Infinity;
      const eventsAtFrame = replay.dynamic_events.filter(ev => Number(ev.t) > prevT + 1e-9 && Number(ev.t) <= frame.t + 1e-9);
      const frameEvents = frameEventLabels(frame);
      const allEvents = [
        ...eventsAtFrame.map(formatEvent),
        ...frameEvents
      ];
      const eventText = allEvents.length ? allEvents.join('；') : '当前帧无事件';
      const obstacleCount = (frame.obstacles || replay.static_map.obstacles).length;
      const followerCount = frame.followers?.length || 0;
      const dirtyHint = eventsDirtySinceRun ? ' 时间轴事件已编辑，重新运行仿真后轨迹和障碍物状态会按新事件更新。' : '';
      const followerNote = replay.metadata?.follower_pose_mode === 'illustrative_lateral_offsets'
        ? '示意从机'
        : '从机';
      return `${eventText}。障碍物 ${obstacleCount} 个，Leader (${frame.leader_pose.map(v => v.toFixed(2)).join(', ')}), ${followerNote} ${followerCount} 架。${dirtyHint}`;
    }

    function frameEventLabels(frame) {
      if (!frame) return [];
      const labels = [];
      if (frame.collision) labels.push('发生碰撞');
      if (frame.clearance_blocked) labels.push('连续clearance不足，已阻止前进');
      if (frame.obstacle_changed) labels.push('障碍物状态变化');
      ['dstar_lite', 'astar', 'hybrid_astar'].forEach(name => {
        if (frame[name]?.replan_triggered) labels.push(`${plannerLabel(name)}重规划`);
      });
      return labels;
    }

    function formatEvent(ev) {
      if (ev.action === 'remove') return `移除 ${ev.target_id}`;
      if (ev.action === 'move') return `移动 ${ev.target_id}`;
      return `添加 ${ev.obstacle?.type || 'obstacle'}`;
    }

    function resizeCanvas() {
      const canvas = $('mapCanvas');
      const rect = canvas.getBoundingClientRect();
      canvas.width = Math.max(640, Math.floor(rect.width * devicePixelRatio));
      canvas.height = Math.max(360, Math.floor(rect.height * devicePixelRatio));
    }

    function project(bounds, canvas, point) {
      const min = bounds[0], max = bounds[1];
      const pad = 28 * devicePixelRatio;
      const sx = (canvas.width - pad * 2) / Math.max(1e-6, max[0] - min[0]);
      const sy = (canvas.height - pad * 2) / Math.max(1e-6, max[1] - min[1]);
      const s = Math.min(sx, sy);
      return [
        pad + (point[0] - min[0]) * s,
        canvas.height - pad - (point[1] - min[1]) * s,
        s
      ];
    }

    // 路径插值，使轨迹更连续
    function densifyPath(path, minStep = 0.15) {
      if (!path || path.length < 2) return path || [];
      const out = [path[0]];
      for (let i = 1; i < path.length; i++) {
        const a = path[i - 1], b = path[i];
        const dist = Math.hypot(b[0] - a[0], b[1] - a[1], b[2] - a[2]);
        const steps = Math.max(1, Math.ceil(dist / minStep));
        for (let s = 1; s <= steps; s++) {
          const t = s / steps;
          out.push([a[0] + (b[0] - a[0]) * t, a[1] + (b[1] - a[1]) * t, a[2] + (b[2] - a[2]) * t]);
        }
      }
      return out;
    }

    function drawReplay(replay) {
      const canvas = $('mapCanvas');
      const ctx = canvas.getContext('2d');
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#fbfcff';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      if (!replay) return;

      const bounds = replay.static_map.bounds;
      ctx.lineWidth = 1 * devicePixelRatio;
      ctx.strokeStyle = '#d8dee9';
      for (let i = 0; i <= 10; i++) {
        const x = canvas.width * i / 10;
        const y = canvas.height * i / 10;
        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
      }

      const frame = currentFrame(replay);
      if (!frame) return;
      for (const obs of frame.obstacles || replay.static_map.obstacles) drawObstacle(ctx, canvas, bounds, obs);
      const playedFrames = replay.frames.slice(0, currentFrameIndex + 1);
      const leaderTrail = densifyPath(playedFrames.map(f => f.leader_pose));
      drawPath(ctx, canvas, bounds, leaderTrail, '#1f2937', false, 3.4);
      drawTrailDots(ctx, canvas, bounds, playedFrames.map(f => f.leader_pose), '#1f2937');
      drawFollowerTrails(ctx, canvas, bounds, playedFrames);
      if (frame.dstar_lite?.path) drawPath(ctx, canvas, bounds, densifyPath(frame.dstar_lite.path), '#168a53', false);
      if (frame.astar?.path) drawPath(ctx, canvas, bounds, densifyPath(frame.astar.path), '#d46b08', true);
      if (frame.hybrid_astar?.path) drawPath(ctx, canvas, bounds, densifyPath(frame.hybrid_astar.path), '#7c3aed', true, 2.4, [3, 5, 1, 5]);
      drawWaypoints(ctx, canvas, bounds, replay.waypoints || []);
      (frame.followers || []).forEach(point => drawPoint(ctx, canvas, bounds, point, '#0891b2', 4));
      drawPoint(ctx, canvas, bounds, frame.leader_pose, '#d92d20', 5);
      drawFrameHud(ctx, frame);
    }

    function drawObstacle(ctx, canvas, bounds, obs) {
      const p = project(bounds, canvas, obs.center_or_min);
      ctx.save();
      ctx.globalAlpha = 0.45;
      if (obs.type === 'aabb') {
        const q = project(bounds, canvas, obs.size_or_max);
        ctx.fillStyle = '#94a3b8';
        ctx.fillRect(Math.min(p[0], q[0]), Math.min(p[1], q[1]), Math.abs(q[0] - p[0]), Math.abs(q[1] - p[1]));
      } else {
        ctx.fillStyle = obs.type === 'cylinder' ? '#facc15' : '#60a5fa';
        ctx.beginPath();
        ctx.arc(p[0], p[1], Math.max(3, obs.size_or_max[0] * p[2]), 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
    }

    function drawPath(ctx, canvas, bounds, path, color, dashed, width = 2.4, dashPattern = null) {
      if (path.length < 2) return;
      ctx.save();
      ctx.strokeStyle = color;
      ctx.lineWidth = width * devicePixelRatio;
      ctx.lineJoin = 'round';
      ctx.lineCap = 'round';
      if (dashed && dashPattern) ctx.setLineDash(dashPattern.map(v => v * devicePixelRatio));
      else if (dashed) ctx.setLineDash([8 * devicePixelRatio, 6 * devicePixelRatio]);
      ctx.beginPath();
      path.forEach((pt, i) => {
        const p = project(bounds, canvas, pt);
        if (i === 0) ctx.moveTo(p[0], p[1]);
        else ctx.lineTo(p[0], p[1]);
      });
      ctx.stroke();
      ctx.restore();
    }

    function drawTrailDots(ctx, canvas, bounds, path, color) {
      if (!path || path.length < 2) return;
      ctx.save();
      ctx.fillStyle = color;
      ctx.globalAlpha = 0.5;
      path.forEach((point, index) => {
        if (index % 2 !== 0 && index !== path.length - 1) return;
        const p = project(bounds, canvas, point);
        ctx.beginPath();
        ctx.arc(p[0], p[1], 2.2 * devicePixelRatio, 0, Math.PI * 2);
        ctx.fill();
      });
      ctx.restore();
    }

    function drawFollowerTrails(ctx, canvas, bounds, frames) {
      const count = frames[frames.length - 1]?.followers?.length || 0;
      for (let i = 0; i < count; i++) {
        const trail = densifyPath(frames.map(frame => frame.followers?.[i]).filter(Boolean));
        ctx.save();
        ctx.globalAlpha = 0.35;
        drawPath(ctx, canvas, bounds, trail, '#0891b2', false, 1.2);
        ctx.restore();
      }
    }

    function drawPoint(ctx, canvas, bounds, point, color, radius) {
      const p = project(bounds, canvas, point);
      ctx.save();
      ctx.fillStyle = color;
      ctx.strokeStyle = '#ffffff';
      ctx.lineWidth = 1.5 * devicePixelRatio;
      ctx.beginPath();
      ctx.arc(p[0], p[1], radius * devicePixelRatio, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();
      ctx.restore();
    }

    function drawWaypoints(ctx, canvas, bounds, waypoints) {
      if (!waypoints || waypoints.length < 2) return;
      // 绘制航点连接线（灰色虚线）
      ctx.save();
      ctx.strokeStyle = '#64748b';
      ctx.lineWidth = 1.2 * devicePixelRatio;
      ctx.setLineDash([5 * devicePixelRatio, 4 * devicePixelRatio]);
      ctx.beginPath();
      waypoints.forEach((pt, i) => {
        const p = project(bounds, canvas, pt);
        if (i === 0) ctx.moveTo(p[0], p[1]);
        else ctx.lineTo(p[0], p[1]);
      });
      ctx.stroke();
      ctx.restore();

      // 绘制每个航点（起点绿色方块，终点红色菱形，中间为编号圆）
      waypoints.forEach((pt, i) => {
        const p = project(bounds, canvas, pt);
        const r = 6 * devicePixelRatio;
        ctx.save();
        ctx.strokeStyle = '#ffffff';
        ctx.lineWidth = 1.5 * devicePixelRatio;

        if (i === 0) {
          // 起点：绿色方块
          ctx.fillStyle = '#16a34a';
          ctx.beginPath();
          ctx.rect(p[0] - r, p[1] - r, r * 2, r * 2);
          ctx.fill();
          ctx.stroke();
          // 标签
          ctx.fillStyle = '#16a34a';
          ctx.font = `bold ${11 * devicePixelRatio}px "Segoe UI", Arial`;
          ctx.fillText('S', p[0] + r + 4 * devicePixelRatio, p[1] + 4 * devicePixelRatio);
        } else if (i === waypoints.length - 1) {
          // 终点：红色菱形
          ctx.fillStyle = '#d92d20';
          ctx.beginPath();
          ctx.moveTo(p[0], p[1] - r);
          ctx.lineTo(p[0] + r, p[1]);
          ctx.lineTo(p[0], p[1] + r);
          ctx.lineTo(p[0] - r, p[1]);
          ctx.closePath();
          ctx.fill();
          ctx.stroke();
          ctx.fillStyle = '#d92d20';
          ctx.font = `bold ${11 * devicePixelRatio}px "Segoe UI", Arial`;
          ctx.fillText('G', p[0] + r + 4 * devicePixelRatio, p[1] + 4 * devicePixelRatio);
        } else {
          // 中间航点：编号灰圆
          ctx.fillStyle = '#64748b';
          ctx.beginPath();
          ctx.arc(p[0], p[1], r * 0.75, 0, Math.PI * 2);
          ctx.fill();
          ctx.stroke();
          ctx.fillStyle = '#ffffff';
          ctx.font = `${9 * devicePixelRatio}px "Segoe UI", Arial`;
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText(String(i + 1), p[0], p[1]);
          ctx.textAlign = 'start';
          ctx.textBaseline = 'alphabetic';
        }
        ctx.restore();
      });
    }

    function drawFrameHud(ctx, frame) {
      const text = `frame ${currentFrameIndex + 1}/${lastReplay.frames.length}  t=${frame.t.toFixed(1)}s  leader=(${frame.leader_pose.map(v => v.toFixed(2)).join(', ')})`;
      ctx.save();
      ctx.font = `${13 * devicePixelRatio}px "Segoe UI", Arial`;
      const pad = 8 * devicePixelRatio;
      const width = ctx.measureText(text).width + pad * 2;
      const height = 30 * devicePixelRatio;
      ctx.fillStyle = 'rgba(255,255,255,0.88)';
      ctx.fillRect(12 * devicePixelRatio, 12 * devicePixelRatio, width, height);
      ctx.strokeStyle = '#cbd5e1';
      ctx.strokeRect(12 * devicePixelRatio, 12 * devicePixelRatio, width, height);
      ctx.fillStyle = '#18202f';
      ctx.fillText(text, 12 * devicePixelRatio + pad, 32 * devicePixelRatio);
      ctx.restore();
    }

    function renderPlot3D(replay) {
      const target = $('plot3d');
      if (!replay) { target.innerHTML = ''; return; }
      if (!window.Plotly) { target.textContent = 'Plotly 未加载'; return; }
      try {
        const bounds = replay.static_map.bounds;
        const frame = currentFrame(replay) || {};
        const playedFrames = replay.frames.slice(0, currentFrameIndex + 1);
        const waypoints = replay.waypoints || [];
        const traces = [
          ...floorGridTraces(bounds),
          ...(frame.obstacles || replay.static_map.obstacles).flatMap(obstacleTrace3D),
          trajectoryTrace(playedFrames.map(f => f.leader_pose), 'Leader轨迹', '#1f2937', 6),
          ...followerTrajectoryTraces(playedFrames),
          pathTrace(frame.dstar_lite?.path, 'D* Lite', '#168a53', 7, 'solid'),
          pathTrace(frame.astar?.path, 'Grid A*', '#d46b08', 5, 'dash'),
          pathTrace(frame.hybrid_astar?.path, 'Hybrid A*', '#7c3aed', 4, 'dashdot'),
          waypoints.length > 0 ? trajectoryTrace(waypoints, '航线', '#64748b', 2) : null,
          waypoints.length > 0 ? markerTrace([waypoints[0]], '起点 S', '#16a34a', 10, 'square') : null,
          waypoints.length > 1 ? markerTrace([waypoints[waypoints.length - 1]], '终点 G', '#d92d20', 10, 'diamond') : null,
          waypoints.length > 2 ? markerTrace(waypoints.slice(1, -1), '航点', '#64748b', 6, 'circle') : null,
          markerTrace([frame.leader_pose].filter(Boolean), 'Leader当前', '#d92d20', 8),
          markerTrace(frame.followers || [], 'Follower示意当前', '#0891b2', 6)
        ].filter(Boolean);
        
        let camera = {eye: {x: 1.45, y: -1.65, z: 1.05}};
        if (target._fullLayout && target._fullLayout.scene && target._fullLayout.scene.camera) {
          camera = target._fullLayout.scene.camera;
        }

        const layout = {
          autosize: true, margin: {l: 0, r: 0, t: 6, b: 0},
          paper_bgcolor: '#fbfcff', plot_bgcolor: '#fbfcff',
          legend: {orientation: 'h', y: 0.02, x: 0.02, bgcolor: 'rgba(255,255,255,0.72)'},
          scene: {
            xaxis: {title: 'X / m', backgroundcolor: '#fbfcff', gridcolor: '#d8dee9', zerolinecolor: '#cbd5e1'},
            yaxis: {title: 'Y / m', backgroundcolor: '#fbfcff', gridcolor: '#d8dee9', zerolinecolor: '#cbd5e1'},
            zaxis: {title: 'Z / m', backgroundcolor: '#fbfcff', gridcolor: '#d8dee9', zerolinecolor: '#cbd5e1'},
            aspectmode: 'data', camera: camera
          }

      } catch (error) {

      }
    }

    function resizePlot3D() {
      if (window.Plotly && $('plot3d')) Plotly.Plots.resize($('plot3d'));
    }

    function project3D(bounds, canvas, point) {
      const min = bounds[0], max = bounds[1];
      const dx = Math.max(1e-6, max[0] - min[0]);
      const dy = Math.max(1e-6, max[1] - min[1]);
      const dz = Math.max(1e-6, max[2] - min[2]);
      const scale = Math.min(canvas.width / (dx + dy), canvas.height / (0.42 * (dx + dy) + dz)) * 0.72;
      const x = point[0] - (min[0] + max[0]) * 0.5;
      const y = point[1] - (min[1] + max[1]) * 0.5;
      const z = point[2] - min[2];
      return [
        canvas.width * 0.5 + (x - y) * scale,
        canvas.height * 0.72 + (x + y) * scale * 0.42 - z * scale * 0.9
      ];
    }

    function drawGrid3D(ctx, canvas, bounds) {
      const [min, max] = bounds;
      ctx.strokeStyle = '#d8dee9';
      ctx.lineWidth = 1 * devicePixelRatio;
      for (let i = 0; i <= 10; i++) {
        const x = min[0] + (max[0] - min[0]) * i / 10;
        const y = min[1] + (max[1] - min[1]) * i / 10;
        drawPolyline3D(ctx, canvas, bounds, [[x, min[1], min[2]], [x, max[1], min[2]]], '#e2e8f0', 1);
        drawPolyline3D(ctx, canvas, bounds, [[min[0], y, min[2]], [max[0], y, min[2]]], '#e2e8f0', 1);
      }
    }

    function drawPolyline3D(ctx, canvas, bounds, path, color, width, dashed = false, dashPattern = null) {
      if (!path || path.length < 2) return;
      ctx.save();
      ctx.strokeStyle = color;
      ctx.lineWidth = width * devicePixelRatio;
      if (dashed && dashPattern) ctx.setLineDash(dashPattern.map(v => v * devicePixelRatio));
      else if (dashed) ctx.setLineDash([7 * devicePixelRatio, 5 * devicePixelRatio]);
      ctx.beginPath();
      path.forEach((pt, index) => {
        const p = project3D(bounds, canvas, pt);
        if (index === 0) ctx.moveTo(p[0], p[1]);
        else ctx.lineTo(p[0], p[1]);
      });
      ctx.stroke();
      ctx.restore();
    }

    function drawFollowerTrails3D(ctx, canvas, bounds, frames) {
      const count = frames[frames.length - 1]?.followers?.length || 0;
      for (let i = 0; i < count; i++) {
        const trail = frames.map(frame => frame.followers?.[i]).filter(Boolean);
        drawPolyline3D(ctx, canvas, bounds, trail, '#0891b2', 1.6);
      }
    }

    function drawObstacle3D(ctx, canvas, bounds, obs) {
      if (obs.type === 'aabb') {
        const min = obs.center_or_min;
        const max = obs.size_or_max;
        drawBox3D(ctx, canvas, bounds, min, max, '#94a3b8');
        return;
      }
      const center = obs.center_or_min;
      const radius = obs.size_or_max[0];
      const base = project3D(bounds, canvas, center);
      const top = obs.type === 'cylinder'
        ? project3D(bounds, canvas, [center[0], center[1], obs.size_or_max[2]])
        : base;
      ctx.save();
      ctx.globalAlpha = 0.55;
      ctx.fillStyle = obs.type === 'cylinder' ? '#facc15' : '#60a5fa';
      ctx.beginPath();
      ctx.ellipse(top[0], top[1], Math.max(5, radius * 9), Math.max(3, radius * 4), -0.35, 0, Math.PI * 2);
      ctx.fill();
      if (obs.type === 'cylinder') {
        ctx.strokeStyle = '#b45309';
        ctx.beginPath();
        ctx.moveTo(base[0], base[1]);
        ctx.lineTo(top[0], top[1]);
        ctx.stroke();
      }
      ctx.restore();
    }

    function drawBox3D(ctx, canvas, bounds, min, max, color) {
      const corners = [
        [min[0], min[1], min[2]], [max[0], min[1], min[2]], [max[0], max[1], min[2]], [min[0], max[1], min[2]],
        [min[0], min[1], max[2]], [max[0], min[1], max[2]], [max[0], max[1], max[2]], [min[0], max[1], max[2]]
      ].map(p => project3D(bounds, canvas, p));
      const faces = [[0, 1, 2, 3], [4, 5, 6, 7], [0, 1, 5, 4], [1, 2, 6, 5], [2, 3, 7, 6], [3, 0, 4, 7]];
      ctx.save();
      ctx.globalAlpha = 0.38;
      ctx.fillStyle = color;
      ctx.strokeStyle = '#64748b';
      faces.forEach(face => {
        ctx.beginPath();
        face.forEach((idx, n) => n ? ctx.lineTo(corners[idx][0], corners[idx][1]) : ctx.moveTo(corners[idx][0], corners[idx][1]));
        ctx.closePath();
        ctx.fill();
        ctx.stroke();
      });
      ctx.restore();
    }

    function drawMarker3D(ctx, canvas, bounds, point, color, radius) {
      const p = project3D(bounds, canvas, point);
      ctx.save();
      ctx.fillStyle = color;
      ctx.strokeStyle = '#ffffff';
      ctx.lineWidth = 1.5 * devicePixelRatio;
      ctx.beginPath();
      ctx.arc(p[0], p[1], radius * devicePixelRatio, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();
      ctx.restore();
    }

    function drawWaypoints3D(ctx, canvas, bounds, waypoints) {
      if (!waypoints || waypoints.length < 2) return;
      // 虚线连接
      ctx.save();
      ctx.strokeStyle = '#64748b';
      ctx.lineWidth = 1.2 * devicePixelRatio;
      ctx.setLineDash([5 * devicePixelRatio, 4 * devicePixelRatio]);
      ctx.beginPath();
      waypoints.forEach((pt, i) => {
        const p = project3D(bounds, canvas, pt);
        if (i === 0) ctx.moveTo(p[0], p[1]);
        else ctx.lineTo(p[0], p[1]);
      });
      ctx.stroke();
      ctx.restore();

      waypoints.forEach((pt, i) => {
        const p = project3D(bounds, canvas, pt);
        const r = 6 * devicePixelRatio;
        ctx.save();
        ctx.strokeStyle = '#ffffff';
        ctx.lineWidth = 1.5 * devicePixelRatio;
        if (i === 0) {
          ctx.fillStyle = '#16a34a';
          ctx.beginPath();
          ctx.rect(p[0] - r, p[1] - r, r * 2, r * 2);
          ctx.fill(); ctx.stroke();
        } else if (i === waypoints.length - 1) {
          ctx.fillStyle = '#d92d20';
          ctx.beginPath();
          ctx.moveTo(p[0], p[1] - r);
          ctx.lineTo(p[0] + r, p[1]);
          ctx.lineTo(p[0], p[1] + r);
          ctx.lineTo(p[0] - r, p[1]);
          ctx.closePath();
          ctx.fill(); ctx.stroke();
        }
        ctx.restore();
      });
    }

    function drawLegend3D(ctx, canvas, note) {
      ctx.save();
      ctx.fillStyle = 'rgba(255,255,255,0.82)';
      ctx.fillRect(12 * devicePixelRatio, 12 * devicePixelRatio, 350 * devicePixelRatio, note ? 54 * devicePixelRatio : 30 * devicePixelRatio);
      ctx.fillStyle = '#475467';
      ctx.font = `${12 * devicePixelRatio}px "Segoe UI", Arial`;
      ctx.fillText('3D view: Leader / Follower proxies / D* Lite / Grid A* / Obstacles', 22 * devicePixelRatio, 32 * devicePixelRatio);
      if (note) ctx.fillText(note, 22 * devicePixelRatio, 54 * devicePixelRatio);
      ctx.restore();
    }

    function pathTrace(path, name, color, width, dash) {
      if (!path || path.length < 2) return null;
      const trace = {
        type: 'scatter3d',
        mode: dash === 'dash' ? 'lines+markers' : 'lines',
        name,
        x: path.map(p => p[0]),
        y: path.map(p => p[1]),
        z: path.map(p => p[2]),
        line: {color, width}
      };
      if (dash === 'dash') trace.marker = {color, size: 2, line: {color, width: 0}};
      return trace;
    }

    function trajectoryTrace(path, name, color, width) {
      if (!path || path.length < 2) return null;
      return {
        type: 'scatter3d',
        mode: 'lines',
        name,
        x: path.map(p => p[0]),
        y: path.map(p => p[1]),
        z: path.map(p => p[2]),
        line: {color, width}
      };
    }

    function followerTrajectoryTraces(frames) {
      const count = frames[frames.length - 1]?.followers?.length || 0;
      const traces = [];
      for (let i = 0; i < count; i++) {
        const path = frames.map(frame => frame.followers?.[i]).filter(Boolean);
        const trace = trajectoryTrace(path, `Follower示意 ${i + 1}轨迹`, '#0891b2', 3);
        if (trace) {
          trace.opacity = 0.72;
          traces.push(trace);
        }
      }
      return traces;
    }

    function markerTrace(points, name, color, size, symbol = 'circle') {
      if (!points || points.length === 0) return null;
      return {
        type: 'scatter3d',
        mode: 'markers',
        name,
        x: points.map(p => p[0]),
        y: points.map(p => p[1]),
        z: points.map(p => p[2]),
        marker: {color, size, symbol, line: {color: '#ffffff', width: 1}}
      };
    }

    function floorGridTraces(bounds) {
      const [min, max] = bounds;
      const z = min[2];
      const traces = [];
      const steps = 8;
      for (let i = 0; i <= steps; i++) {
        const x = min[0] + (max[0] - min[0]) * i / steps;
        const y = min[1] + (max[1] - min[1]) * i / steps;
        traces.push({type: 'scatter3d', mode: 'lines', showlegend: false, hoverinfo: 'skip',
          x: [x, x], y: [min[1], max[1]], z: [z, z], line: {color: '#e2e8f0', width: 1}});
        traces.push({type: 'scatter3d', mode: 'lines', showlegend: false, hoverinfo: 'skip',
          x: [min[0], max[0]], y: [y, y], z: [z, z], line: {color: '#e2e8f0', width: 1}});
      }
      return traces;
    }

    function obstacleTrace3D(obs) {
      if (obs.type === 'aabb') return [boxMesh(obs)];
      if (obs.type === 'sphere') return [sphereMesh(obs)];
      if (obs.type === 'cylinder') return [cylinderMesh(obs)];
      return [];
    }

    function boxMesh(obs) {
      const min = obs.center_or_min;
      const max = obs.size_or_max;
      const x = [min[0], max[0], max[0], min[0], min[0], max[0], max[0], min[0]];
      const y = [min[1], min[1], max[1], max[1], min[1], min[1], max[1], max[1]];
      const z = [min[2], min[2], min[2], min[2], max[2], max[2], max[2], max[2]];
      return {
        type: 'mesh3d',
        name: obs.id || 'AABB',
        x, y, z,
        i: [0, 0, 4, 4, 0, 0, 1, 1, 2, 2, 3, 3],
        j: [1, 2, 6, 7, 4, 5, 5, 6, 6, 7, 7, 4],
        k: [2, 3, 7, 5, 5, 1, 6, 2, 7, 3, 4, 0],
        color: '#94a3b8',
        opacity: 0.28,
        flatshading: true
      };
    }

    function sphereMesh(obs) {
      const center = obs.center_or_min;
      const radius = obs.size_or_max[0];
      const latSteps = 12;
      const lonSteps = 18;
      const x = [], y = [], z = [], i = [], j = [], k = [];
      for (let lat = 0; lat <= latSteps; lat++) {
        const theta = Math.PI * lat / latSteps;
        for (let lon = 0; lon <= lonSteps; lon++) {
          const phi = Math.PI * 2 * lon / lonSteps;
          x.push(center[0] + radius * Math.sin(theta) * Math.cos(phi));
          y.push(center[1] + radius * Math.sin(theta) * Math.sin(phi));
          z.push(center[2] + radius * Math.cos(theta));
        }
      }
      for (let lat = 0; lat < latSteps; lat++) {
        for (let lon = 0; lon < lonSteps; lon++) {
          const a = lat * (lonSteps + 1) + lon;
          const b = a + lonSteps + 1;
          i.push(a, a + 1);
          j.push(b, b);
          k.push(a + 1, b + 1);
        }
      }
      return {type: 'mesh3d', name: obs.id || 'Sphere', x, y, z, i, j, k, color: '#60a5fa', opacity: 0.32, flatshading: true};
    }

    function cylinderMesh(obs) {
      const center = obs.center_or_min;
      const [radius, zMin, zMax] = obs.size_or_max;
      const segments = 28;
      const x = [center[0], center[0]], y = [center[1], center[1]], z = [zMin, zMax];
      const i = [], j = [], k = [];
      for (let s = 0; s < segments; s++) {
        const angle = Math.PI * 2 * s / segments;
        x.push(center[0] + radius * Math.cos(angle), center[0] + radius * Math.cos(angle));
        y.push(center[1] + radius * Math.sin(angle), center[1] + radius * Math.sin(angle));
        z.push(zMin, zMax);
      }
      for (let s = 0; s < segments; s++) {
        const next = (s + 1) % segments;
        const a0 = 2 + s * 2, a1 = a0 + 1;
        const b0 = 2 + next * 2, b1 = b0 + 1;
        i.push(a0, a1, 0, 1);
        j.push(b0, b1, b0, a1);
        k.push(a1, b0, a0, b1);
      }
      return {type: 'mesh3d', name: obs.id || 'Cylinder', x, y, z, i, j, k, color: '#facc15', opacity: 0.34, flatshading: true};
    }

    function renderMetrics(replay) {
      const container = $('metrics');
      const evidence = $('replayEvidence');
      if (evidence) {
        const replanCount = replay.replan_events?.length || 0;
        const sensorFrames = replay.sensor_logs?.length || 0;
        const collisionCount = replay.collision_log?.length || 0;
        const faultCount = replay.fault_log?.length || 0;
        const apfScope = replay.metadata?.apf_profile_scope || 'cpp_subset_runtime';
        const apfRuntime = (replay.metadata?.apf_runtime_fields || []).join(', ') || '-';
        const apfPythonOnly = (replay.metadata?.apf_python_only_fields || []).join(', ') || '-';
        const apfPending = (replay.metadata?.apf_cpp_pending_fields || []).join(', ') || '-';
        evidence.textContent =
          `证据摘要：task_waypoints ${replay.task_waypoints?.length || 0}，replanned_waypoints ${replay.replanned_waypoints?.length || 0}，executed_path ${replay.executed_path?.length || 0}，replan_events ${replanCount}，sensor_logs ${sensorFrames}，collision_log ${collisionCount}，fault_log ${faultCount}。当前回放仍是 leader-centric 口径。APF 口径：${apfScope}；C++ 当前生效字段：${apfRuntime}；Python 主线字段：${apfPythonOnly}；待同步到 C++：${apfPending}。`;
      }
      const summaryLabel = replay.metadata?.summary_mode === 'shared_leader_frame_eval'
        ? '共享 Leader 轨迹逐帧评估'
        : 'Planner 统计';
      container.innerHTML = Object.entries(replay.summary).map(([name, s]) => `
        <div class="metric">
          <h3>${name}</h3>
          <dl>
            <dt>统计口径</dt><dd>${summaryLabel}</dd>
            <dt>逐帧评估次数</dt><dd>${s.total_replans}</dd>
            <dt>平均耗时</dt><dd>${s.avg_compute_ms.toFixed(3)} ms</dd>
            <dt>P95 耗时</dt><dd>${s.p95_compute_ms.toFixed(3)} ms</dd>
            <dt>碰撞次数</dt><dd>${s.collisions}</dd>
            <dt>路径长度</dt><dd>${s.path_length_m.toFixed(2)} m</dd>
            <dt>终点距离</dt><dd>${s.final_dist_to_goal.toFixed(2)} m</dd>
          </dl>
        </div>
      `).join('');
    }

    function renderCharts(replay) {
      const labels = replay.frames.map(f => f.t.toFixed(1));
      const plannerColors = {dstar_lite: '#168a53', astar: '#d46b08', hybrid_astar: '#7c3aed'};
      const plannerNames = {dstar_lite: 'D* Lite', astar: 'Grid A*', hybrid_astar: 'Hybrid A*'};
      const planners = ['dstar_lite', 'astar', 'hybrid_astar'].filter(p => replay.frames.some(f => f[p]));
      const timeDatasets = planners.map(p => ({
        label: plannerNames[p] || p,
        data: replay.frames.map(f => f[p]?.compute_time_ms ?? null),
        borderColor: plannerColors[p],
        pointRadius: 0,
        tension: 0.2
      }));
      const pathDatasets = planners.map(p => ({
        label: plannerNames[p] || p,
        data: replay.frames.map(f => pathLen(f[p]?.path || [])),
        borderColor: plannerColors[p],
        pointRadius: 0,
        tension: 0.2
      }));
      timeChart?.destroy();
      pathChart?.destroy();
      timeChart = new Chart($('timeChart'), {type: 'line', data: {labels, datasets: timeDatasets}, options: chartOptions('ms')});
      pathChart = new Chart($('pathChart'), {type: 'line', data: {labels, datasets: pathDatasets}, options: chartOptions('m')});
    }

    function pathLen(path) {
      let total = 0;
      for (let i = 1; i < path.length; i++) {
        const a = path[i - 1], b = path[i];
        total += Math.hypot(b[0] - a[0], b[1] - a[1], b[2] - a[2]);
      }
      return total;
    }

    function chartOptions(unit) {
      return {
        responsive: true,
        maintainAspectRatio: false,
        scales: {x: {display: false}, y: {title: {display: true, text: unit}}},
        plugins: {legend: {position: 'bottom'}}
      };
    }

    init().catch(err => $('status').textContent = err.message);
  </script>
</body>
</html>
